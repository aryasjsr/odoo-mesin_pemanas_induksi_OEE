version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: odoo_db
    environment:
      POSTGRES_DB: ${DB_NAME:-odoo}
      POSTGRES_USER: ${DB_USER:-odoo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-odoo}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - odoo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-odoo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: odoo_redis
    ports:
      - "6379:6379"
    networks:
      - odoo_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: odoo:18.0
    container_name: odoo_web
    command: odoo --dev=all,reload,qweb
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${ODOO_PORT:-8069}:8069"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - odoo_data:/var/lib/odoo
      - ./addons:/mnt/extra-addons:rw
    environment:
      - HOST=${DB_HOST:-db}
      - PORT=5432
      - USER=${DB_USER:-odoo}
      - PASSWORD=${DB_PASSWORD:-odoo}
      - DB_NAME=${DB_NAME:-odoo}
      - ADDONS_PATH=/mnt/extra-addons
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - ODOO_ADMIN_PASSWD=${ADMIN_PASSWORD:-admin}
    networks:
      - odoo_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069/web"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  db_data:
    driver: local
  odoo_data:
    driver: local

networks:
  odoo_network:
    driver: bridge
